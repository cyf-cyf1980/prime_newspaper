<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIME 新聞記事データベース</title>
<style>
  :root {
    --ink:      #333333;
    --ink-mid:  #555555;
    --ink-faint:#999999;
    --rule:     #b8e6f0;
    --paper:    #fefef2;
    --paper-2:  #eefafd;
    --accent:   #00afcc;
    --accent-lt:#33c2d9;
    --tag-bg:   #d0f0f8;
    --shadow:   rgba(0,175,204,.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", Georgia, serif;
    background: var(--paper-2);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--accent);
    color: #fff;
    border-bottom: 3px solid var(--accent-lt);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 18px 28px 14px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    flex-wrap: wrap;
  }
  .site-name {
    font-size: 11px;
    letter-spacing: .2em;
    color: rgba(255,255,255,.75);
    font-family: "Helvetica Neue", Arial, sans-serif;
    text-transform: uppercase;
  }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: .04em; line-height: 1.2; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,.8); font-family: "Helvetica Neue", Arial, sans-serif; margin-left: auto; }

  /* ── LOADING ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: var(--paper-2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    gap: 20px;
  }
  #loading-overlay.hidden { display: none; }
  .loading-logo {
    font-size: 32px; font-weight: 700;
    color: var(--accent); letter-spacing: .1em;
    font-family: Georgia, serif;
  }
  .loading-msg {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 14px; color: var(--ink-mid);
  }
  .progress-bar-wrap {
    width: 300px; height: 6px;
    background: var(--rule);
    border-radius: 3px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: var(--accent);
    border-radius: 3px;
    transition: width .3s;
  }

  /* ── SEARCH PANEL ── */
  .search-panel {
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    box-shadow: 0 2px 8px var(--shadow);
    position: sticky; top: 0; z-index: 100;
  }
  .search-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 12px 28px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .kw-wrap { flex: 1; min-width: 220px; position: relative; }
  .kw-wrap input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1.5px solid var(--rule); border-radius: 3px;
    background: var(--paper-2);
    font-family: inherit; font-size: 14px; color: var(--ink);
    outline: none; transition: border-color .15s;
  }
  .kw-wrap input:focus { border-color: var(--accent); }
  .kw-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faint); font-size: 15px; pointer-events: none;
  }
  select {
    padding: 8px 9px;
    border: 1.5px solid var(--rule); border-radius: 3px;
    background: var(--paper-2);
    font-family: inherit; font-size: 13px; color: var(--ink);
    cursor: pointer; outline: none; transition: border-color .15s;
  }
  select:focus { border-color: var(--accent); }
  .year-range {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; color: var(--ink-mid);
  }
  .year-range input[type=number] {
    width: 66px; padding: 8px 5px;
    border: 1.5px solid var(--rule); border-radius: 3px;
    background: var(--paper-2);
    font-family: inherit; font-size: 13px; color: var(--ink);
    outline: none; text-align: center;
    -moz-appearance: textfield;
  }
  .year-range input[type=number]::-webkit-outer-spin-button,
  .year-range input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .year-range input[type=number]:focus { border-color: var(--accent); }
  .btn-clear {
    padding: 8px 14px;
    border: 1.5px solid var(--rule); border-radius: 3px;
    background: none; font-family: inherit; font-size: 13px;
    color: var(--ink-mid); cursor: pointer; transition: all .15s;
  }
  .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

  /* ── STATS / SORT ── */
  .stats-bar {
    max-width: 1280px; margin: 0 auto;
    padding: 8px 28px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    border-bottom: 1px solid var(--rule);
  }
  .stats-count {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 13px; color: var(--ink-mid);
  }
  .stats-count strong { font-size: 17px; color: var(--accent); font-weight: 700; }
  .searching-indicator {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 12px; color: var(--accent);
    display: none;
  }
  .searching-indicator.active { display: inline; }

  .sort-bar {
    max-width: 1280px; margin: 0 auto;
    padding: 7px 28px;
    display: flex; align-items: center; gap: 5px;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 12px; color: var(--ink-faint);
    border-bottom: 1px solid var(--rule);
  }
  .sort-bar span { margin-right: 4px; }
  .sort-btn {
    padding: 3px 9px;
    border: 1px solid transparent; border-radius: 2px;
    background: none; font-family: inherit; font-size: 12px;
    color: var(--ink-mid); cursor: pointer; transition: all .12s;
  }
  .sort-btn:hover { background: var(--tag-bg); }
  .sort-btn.active { background: var(--accent); color: #fff; }

  /* ── MAIN ── */
  main { max-width: 1280px; margin: 0 auto; padding: 0 28px 40px; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--paper); }
  thead th {
    background: var(--accent); color: #fff;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 11px; letter-spacing: .07em;
    text-transform: uppercase;
    padding: 9px 11px; text-align: left;
    white-space: nowrap; font-weight: 600;
  }
  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { background: var(--accent-lt); }
  tbody tr { border-bottom: 1px solid var(--rule); transition: background .1s; }
  tbody tr:hover { background: #edf9fd; }
  tbody td { padding: 8px 11px; vertical-align: top; line-height: 1.5; }
  td.no   { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 11px; color: var(--ink-faint); white-space: nowrap; width: 52px; }
  td.dt   { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 12px; white-space: nowrap; width: 94px; color: var(--ink-mid); }
  td.pa   { white-space: nowrap; width: 52px; }
  td.ed   { white-space: nowrap; width: 44px; font-size: 12px; color: var(--ink-mid); }
  td.pg   { white-space: nowrap; width: 38px; font-size: 12px; color: var(--ink-faint); text-align: right; }
  td.rg   { font-size: 12px; color: var(--ink-faint); white-space: nowrap; width: 60px; }
  td.ca   { width: 44px; white-space: nowrap; text-align: center; }
  td.hl   { max-width: 560px; }
  td.nt   { font-size: 12px; color: var(--ink-faint); max-width: 110px; }

  /* paper badges */
  .badge { display: inline-block; padding: 2px 5px; border-radius: 2px; font-family: "Helvetica Neue", Arial, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: .03em; white-space: nowrap; }
  .badge-沖縄 { background: #b8edf5; color: #006a80; }
  .badge-琉球 { background: #a4e6f2; color: #005a6e; }
  .badge-朝日 { background: #c8f2f8; color: #007a90; }
  .badge-東京 { background: #d8f6fb; color: #008a9e; }
  .badge-赤旗 { background: #fde8e8; color: #8b1a1a; border: 1px solid #d0a0a0; }
  .badge-日経 { background: #b0eaf5; color: #005f75; }

  /* category badges */
  .cat-badge {
    display: inline-block; padding: 2px 5px; border-radius: 3px;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 11px; font-weight: 700; color: #fff;
  }
  .cat-A { background: #3a9ad9; }
  .cat-B { background: #5aaccc; }
  .cat-C { background: #4ab89a; }
  .cat-D { background: #e07a40; }
  .cat-E { background: #c9a830; }
  .cat-F { background: #9a68c0; }
  .cat-G { background: #d05888; }
  .cat-Z { background: #a0a8b0; }

  mark { background: #ffe066; color: #333; border-radius: 2px; padding: 0 1px; }

  /* empty */
  .empty { padding: 60px 20px; text-align: center; color: var(--ink-faint); font-size: 15px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

  /* pagination */
  .pager {
    display: flex; justify-content: center; align-items: center;
    gap: 5px; padding: 18px 0 8px;
    font-family: "Helvetica Neue", Arial, sans-serif; font-size: 13px;
    flex-wrap: wrap;
  }
  .pager button {
    min-width: 32px; padding: 5px 9px;
    border: 1.5px solid var(--rule); border-radius: 3px;
    background: var(--paper); color: var(--ink-mid);
    cursor: pointer; font-family: inherit; font-size: 13px;
    transition: all .12s;
  }
  .pager button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pager button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pager button:disabled { opacity: .35; cursor: default; }
  .pager .ellipsis { color: var(--ink-faint); padding: 0 3px; }

  /* footer */
  footer {
    text-align: center; padding: 18px;
    font-family: "Helvetica Neue", Arial, sans-serif; font-size: 11px;
    color: var(--ink-faint); border-top: 1px solid var(--rule);
  }

  @media (max-width: 700px) {
    .header-inner, .search-inner { padding-left: 14px; padding-right: 14px; }
    h1 { font-size: 18px; }
    main { padding: 0 8px 30px; }
    .stats-bar, .sort-bar { padding-left: 14px; padding-right: 14px; }
    td.rg, td.nt, td.pg { display: none; }
  }
</style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loading-overlay">
  <div class="loading-logo">PRIME</div>
  <div class="loading-msg" id="loading-msg">データを読み込んでいます...</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
</div>

<header>
  <div class="header-inner">
    <div>
      <div class="site-name">PRIME — Peace Research Institute Meiji Gakuin University</div>
      <h1>新聞記事データベース</h1>
    </div>
    <div class="header-sub">平和・安全保障・沖縄関係記事目録</div>
  </div>
</header>

<div class="search-panel">
  <div class="search-inner">
    <div class="kw-wrap">
      <span class="kw-icon">🔍</span>
      <input type="text" id="kw" placeholder="見出しを検索（例：普天間、基地、演習）" autocomplete="off">
    </div>
    <select id="sel-cat">
      <option value="">すべての大分類</option>
      <option value="A">A｜沖縄・基地問題</option>
      <option value="B">B｜日本の安全保障政策</option>
      <option value="C">C｜核・軍縮・平和</option>
      <option value="D">D｜国際紛争・地域情勢</option>
      <option value="E">E｜原発・エネルギー</option>
      <option value="F">F｜歴史認識・人権</option>
      <option value="G">G｜南北問題・グローバル正義</option>
      <option value="Z">Z｜その他</option>
    </select>
    <select id="sel-paper">
      <option value="">すべての新聞</option>
      <option>沖縄</option>
      <option>琉球</option>
      <option>朝日</option>
      <option>東京</option>
      <option>赤旗</option>
      <option>日経</option>
    </select>
    <select id="sel-edition">
      <option value="">朝刊・夕刊</option>
      <option>朝刊</option>
      <option>夕刊</option>
    </select>
    <div class="year-range">
      <input type="number" id="yr-from" placeholder="1988" min="1988" max="2025">
      <span>〜</span>
      <input type="number" id="yr-to" placeholder="2025" min="1988" max="2025">
      <span>年</span>
    </div>
    <button class="btn-clear" id="btn-clear">クリア</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-count" id="stats-count">読み込み中…</div>
  <span class="searching-indicator" id="searching">検索中…</span>
</div>

<div class="sort-bar">
  <span>並び替え：</span>
  <button class="sort-btn active" data-sort="date-desc">日付（新→旧）</button>
  <button class="sort-btn" data-sort="date-asc">日付（旧→新）</button>
  <button class="sort-btn" data-sort="no-asc">No. 順</button>
  <button class="sort-btn" data-sort="paper">新聞名</button>
  <button class="sort-btn" data-sort="cat">大分類</button>
</div>

<main>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>No.</th>
          <th>日付</th>
          <th>新聞</th>
          <th>刊</th>
          <th style="text-align:right">面</th>
          <th>版・地域</th>
          <th>大分類</th>
          <th>見出し</th>
          <th>備考</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">
      <div class="empty-icon">📰</div>
      <div>条件に一致する記事がありません</div>
    </div>
  </div>
  <div class="pager" id="pager"></div>
</main>

<footer>PRIME 新聞記事データベース — 明治学院大学国際平和研究所　©PRIME</footer>

<script>
'use strict';
// ─────────────────────────────────────────────
// 定数
// ─────────────────────────────────────────────
const PER_PAGE = 50;
const DATA_FILE = 'prime_data.json';

const CAT_LABELS = {
  A:'沖縄・基地問題', B:'日本の安全保障政策', C:'核・軍縮・平和',
  D:'国際紛争・地域情勢', E:'原発・エネルギー', F:'歴史認識・人権',
  G:'南北問題・グローバル正義', Z:'その他'
};

// ─────────────────────────────────────────────
// 状態
// ─────────────────────────────────────────────
let ALL = [];           // 全レコード
let filtered = [];      // フィルター後
let page = 1;
let sortKey = 'date-desc';
let searchTimer = null;

// ─────────────────────────────────────────────
// ユーティリティ
// ─────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function hi(text, kw){
  if(!kw) return esc(text);
  const safe = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(text).replace(new RegExp(safe,'gi'), m=>`<mark>${m}</mark>`);
}

function toDateNum(r){ return r.yr*10000 + r.mo*100 + r.dy; }

// ─────────────────────────────────────────────
// ソート
// ─────────────────────────────────────────────
function applySort(arr){
  const a = arr.slice();
  if(sortKey==='date-desc') a.sort((x,y)=>toDateNum(y)-toDateNum(x));
  else if(sortKey==='date-asc') a.sort((x,y)=>toDateNum(x)-toDateNum(y));
  else if(sortKey==='no-asc') a.sort((x,y)=>x.no-y.no);
  else if(sortKey==='paper') a.sort((x,y)=>x.pa.localeCompare(y.pa,'ja'));
  else if(sortKey==='cat') a.sort((x,y)=>x.ca.localeCompare(y.ca));
  return a;
}

// ─────────────────────────────────────────────
// フィルター（大量データ対応：遅延実行）
// ─────────────────────────────────────────────
function getParams(){
  return {
    kw:    document.getElementById('kw').value.trim(),
    cat:   document.getElementById('sel-cat').value,
    paper: document.getElementById('sel-paper').value,
    ed:    document.getElementById('sel-edition').value,
    yrFrom:parseInt(document.getElementById('yr-from').value)||0,
    yrTo:  parseInt(document.getElementById('yr-to').value)||9999,
  };
}

function doFilter(){
  const {kw, cat, paper, ed, yrFrom, yrTo} = getParams();
  document.getElementById('searching').classList.remove('active');

  filtered = ALL.filter(r=>{
    if(cat   && r.ca !== cat)    return false;
    if(paper && r.pa !== paper)  return false;
    if(ed    && r.ed !== ed)     return false;
    if(r.yr < yrFrom || r.yr > yrTo) return false;
    if(kw    && !r.hl.includes(kw) && !(r.nt||'').includes(kw)) return false;
    return true;
  });

  filtered = applySort(filtered);
  page = 1;
  render();
}

function scheduleFilter(){
  document.getElementById('searching').classList.add('active');
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doFilter, 300);
}

// ─────────────────────────────────────────────
// レンダリング
// ─────────────────────────────────────────────
function render(){
  const {kw} = getParams();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PER_PAGE));
  page = Math.min(page, totalPages);

  // 件数表示
  document.getElementById('stats-count').innerHTML =
    `<strong>${total.toLocaleString()}</strong> 件 / 全 ${ALL.length.toLocaleString()} 件`;

  const slice = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const tbody  = document.getElementById('tbody');
  const emptyEl= document.getElementById('empty');

  if(slice.length===0){
    tbody.innerHTML = '';
    emptyEl.style.display = '';
    document.getElementById('pager').innerHTML = '';
    return;
  }
  emptyEl.style.display = 'none';

  tbody.innerHTML = slice.map(r=>`
    <tr>
      <td class="no">${r.no}</td>
      <td class="dt">${r.dt}</td>
      <td class="pa"><span class="badge badge-${esc(r.pa)}">${esc(r.pa)}</span></td>
      <td class="ed">${esc(r.ed)}</td>
      <td class="pg">${esc(r.pg)}</td>
      <td class="rg">${esc(r.rg)}</td>
      <td class="ca"><span class="cat-badge cat-${esc(r.ca)}" title="${esc(CAT_LABELS[r.ca]||r.ca)}">${esc(r.ca)}</span></td>
      <td class="hl">${hi(r.hl, kw)}</td>
      <td class="nt">${esc(r.nt||'')}</td>
    </tr>`).join('');

  renderPager(totalPages);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderPager(total){
  if(total<=1){ document.getElementById('pager').innerHTML=''; return; }
  let html = `<button onclick="goPage(${page-1})" ${page===1?'disabled':''}>◀</button>`;
  const show = new Set([1,2,total-1,total,page-1,page,page+1].filter(p=>p>=1&&p<=total));
  let prev=0;
  [...show].sort((a,b)=>a-b).forEach(p=>{
    if(prev && p-prev>1) html+=`<span class="ellipsis">…</span>`;
    html+=`<button class="${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
    prev=p;
  });
  html+=`<button onclick="goPage(${page+1})" ${page===total?'disabled':''}>▶</button>`;
  document.getElementById('pager').innerHTML = html;
}

function goPage(p){ page=p; render(); }

// ─────────────────────────────────────────────
// イベント設定
// ─────────────────────────────────────────────
function setupEvents(){
  document.getElementById('kw').addEventListener('input', scheduleFilter);
  ['sel-cat','sel-paper','sel-edition'].forEach(id=>{
    document.getElementById(id).addEventListener('change', scheduleFilter);
  });
  ['yr-from','yr-to'].forEach(id=>{
    document.getElementById(id).addEventListener('change', scheduleFilter);
  });

  document.getElementById('btn-clear').addEventListener('click', ()=>{
    ['kw'].forEach(id=>{ document.getElementById(id).value=''; });
    ['sel-cat','sel-paper','sel-edition'].forEach(id=>{ document.getElementById(id).value=''; });
    ['yr-from','yr-to'].forEach(id=>{ document.getElementById(id).value=''; });
    scheduleFilter();
  });

  document.querySelectorAll('.sort-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      sortKey = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filtered = applySort(filtered);
      page = 1;
      render();
    });
  });
}

// ─────────────────────────────────────────────
// データ読み込み
// ─────────────────────────────────────────────
async function loadData(){
  const overlay = document.getElementById('loading-overlay');
  const msg     = document.getElementById('loading-msg');
  const fill    = document.getElementById('progress-fill');

  try {
    msg.textContent = 'データファイルを取得中...';
    fill.style.width = '20%';

    const res = await fetch(DATA_FILE);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);

    // レスポンスサイズに応じてプログレス表示
    const contentLength = res.headers.get('Content-Length');
    let data;

    if(contentLength){
      const total = parseInt(contentLength);
      const reader = res.body.getReader();
      const chunks = [];
      let received = 0;

      while(true){
        const {done, value} = await reader.read();
        if(done) break;
        chunks.push(value);
        received += value.length;
        const pct = Math.min(90, 20 + (received/total)*65);
        fill.style.width = pct + '%';
        msg.textContent = `データ読み込み中... ${Math.round(received/1024)}KB / ${Math.round(total/1024)}KB`;
      }

      const allChunks = new Uint8Array(received);
      let pos = 0;
      for(const chunk of chunks){ allChunks.set(chunk, pos); pos += chunk.length; }
      const text = new TextDecoder('utf-8').decode(allChunks);
      fill.style.width = '92%';
      msg.textContent = 'データを解析中...';
      data = JSON.parse(text);
    } else {
      fill.style.width = '60%';
      msg.textContent = 'データを解析中...';
      data = await res.json();
    }

    fill.style.width = '97%';
    msg.textContent = `${data.length.toLocaleString()} 件のデータを読み込みました`;

    ALL = data;
    filtered = applySort(ALL);

    await new Promise(r=>setTimeout(r,300));
    fill.style.width = '100%';
    await new Promise(r=>setTimeout(r,200));

    overlay.classList.add('hidden');
    setupEvents();
    render();

  } catch(e) {
    msg.textContent = `読み込みエラー: ${e.message}`;
    fill.style.width = '100%';
    fill.style.background = '#e05050';
    console.error(e);

    // ローカルファイルアクセスのエラーメッセージ
    if(e.message.includes('Failed to fetch') || e.message.includes('NetworkError')){
      document.getElementById('loading-overlay').innerHTML = `
        <div class="loading-logo">PRIME</div>
        <div style="font-family:sans-serif;font-size:14px;color:#555;text-align:center;max-width:480px;line-height:1.8;">
          <p style="color:#c00;margin-bottom:12px;">⚠ データファイルの読み込みに失敗しました</p>
          <p>このファイルはWebサーバー上での使用を想定しています。</p>
          <p>ローカル環境でテストする場合は、<code>prime_data.json</code> を同じフォルダに置いた上で、<br>ローカルサーバー（例：<code>python -m http.server</code>）経由でアクセスしてください。</p>
        </div>
      `;
    }
  }
}

// ─────────────────────────────────────────────
// 起動
// ─────────────────────────────────────────────
loadData();
</script>
</body>
</html>
